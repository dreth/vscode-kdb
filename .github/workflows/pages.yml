name: Pages

on:
  push:
    branches:
      - main
    paths:
      - mkdocs-src/**
      - docs/**
      - mkdocs.yml
      - .github/scripts/**
      - .github/workflows/pages.yml
  pull_request:
    paths:
      - mkdocs-src/**
      - docs/**
      - mkdocs.yml
      - .github/scripts/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install exact docs dependencies
        run: python -m pip install --requirement mkdocs-src/requirements.txt

      - name: Build docs
        run: mkdocs build --strict

      - name: Normalize generated docs
        run: python .github/scripts/clean-mkdocs-output.py docs

      - name: Verify generated docs are committed
        run: |
          git diff --exit-code -- docs
          if [ -n "$(git status --porcelain -- docs)" ]; then
            git status --short -- docs
            exit 1
          fi

      - name: Upload generated docs artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: github-pages-docs
          path: ./docs
